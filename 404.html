<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Not Found – Acentura</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #071440;
      font-family: 'Poppins', sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      box-sizing: border-box;
    }

    .container {
      text-align: center;
      max-width: 360px;
    }

    .logo-link img {
      height: 32px;
      margin-bottom: 48px;
    }

    .logo-link .wordmark {
      display: none;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #00C8E6;
      margin-bottom: 48px;
    }

    .error-code {
      font-size: 80px;
      font-weight: 700;
      color: rgba(0, 200, 230, 0.15);
      line-height: 1;
      margin: 0 0 8px;
      letter-spacing: -2px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin: 0 0 12px;
      color: #fff;
    }

    p {
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      line-height: 1.7;
      margin: 0 0 36px;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: #00C8E6;
      color: #071440;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border-radius: 10px;
      text-decoration: none;
      transition: background 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 20px rgba(0, 200, 230, 0.3);
    }

    .home-link:hover {
      background: #00b8d4;
      box-shadow: 0 6px 24px rgba(0, 200, 230, 0.45);
    }
  </style>
</head>
<body>
  <div class="container">

    <a href="https://acentura.com" class="logo-link">
      <img src="assets/images/acentura-logo.png" alt="Acentura"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='block'" />
      <span class="wordmark">ACENTURA</span>
    </a>

    <div class="error-code">404</div>
    <h1>This card wasn't found</h1>
    <p>The link you scanned may be outdated or this employee's card has been removed. Please ask them for an updated card.</p>

    <a href="https://acentura.com" class="home-link">
      Visit Acentura.com
    </a>

  </div>
</body>
</html>
