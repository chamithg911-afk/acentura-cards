<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acentura Cards — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="login-screen">
    <div class="login-box">
      <img src="assets/images/acentura-logo.png" alt="Acentura" class="login-logo" />
      <h2>Admin Login</h2>
      <p>Acentura Cards Management</p>
      <div class="form-group">
        <input type="password" id="adminPassword" placeholder="Enter admin password" />
      </div>
      <button class="btn-primary" onclick="handleLogin()">Login</button>
      <p id="loginError" class="error-msg"></p>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="hidden">

    <!-- TOP NAV -->
    <nav class="admin-nav">
      <img src="assets/images/acentura-logo.png" alt="Acentura" class="nav-logo" />
      <span class="nav-title">Cards Admin</span>
      <button class="btn-logout" onclick="handleLogout()">Logout</button>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="admin-container">

      <!-- HEADER ROW -->
      <div class="admin-header">
        <div>
          <h1>Employees <span id="employeeCount" class="count-badge">0</span></h1>
          <p>Manage all employee digital cards</p>
        </div>
        <button class="btn-primary" onclick="openModal('add')">+ Add Employee</button>
      </div>

      <!-- SEARCH -->
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search by name, role or department..." oninput="filterEmployees()" />
      </div>

      <!-- EMPLOYEE TABLE -->
      <div class="table-wrapper">
        <table class="employee-table">
          <thead>
            <tr>
              <th>Photo</th>
              <th>Name</th>
              <th>Role</th>
              <th>Department</th>
              <th>Email</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="employeeTableBody">
            <tr><td colspan="7" class="loading-row">Loading employees...</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- ADD / EDIT MODAL -->
  <div id="employeeModal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modalTitle">Add Employee</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <div class="modal-body">
        <!-- PHOTO UPLOAD -->
        <div class="photo-upload-area" onclick="document.getElementById('photoInput').click()">
          <img id="photoPreview" src="" alt="" class="hidden" />
          <div id="photoPlaceholder">
            <span>📷</span>
            <p>Click to upload photo</p>
          </div>
          <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="handlePhotoSelect(event)" />
        </div>

        <!-- FORM FIELDS -->
        <div class="form-grid">
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="fieldName" placeholder="Pemith Paaris" oninput="generateSlug()" />
          </div>
          <div class="form-group">
            <label>Slug (auto-generated)</label>
            <input type="text" id="fieldSlug" placeholder="pemith-paaris" />
          </div>
          <div class="form-group">
            <label>Role *</label>
            <input type="text" id="fieldRole" placeholder="Director of Business Development" />
          </div>
          <div class="form-group">
            <label>Department *</label>
            <input type="text" id="fieldDepartment" placeholder="Business Development" />
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" id="fieldEmail" placeholder="pemith@acentura.com" />
          </div>
          <div class="form-group">
            <label>Phone *</label>
            <input type="text" id="fieldPhone" placeholder="+94 77 123 4567" />
          </div>
          <div class="form-group full-width">
            <label>LinkedIn URL</label>
            <input type="text" id="fieldLinkedIn" placeholder="https://linkedin.com/in/pemith-paaris" />
          </div>
        </div>

        <!-- QR PREVIEW (edit mode only) -->
        <div id="qrSection" class="hidden">
          <label>QR Code</label>
          <div id="qrCode"></div>
          <button class="btn-secondary" onclick="downloadQR()">Download QR Code</button>
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" id="modalSaveBtn" onclick="saveEmployee()">Save Employee</button>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/qrcode.min.js"></script>
  <script src="assets/js/admin.js"></script>

</body>
</html>
