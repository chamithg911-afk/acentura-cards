
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Acentura Cards</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #0A1F52;
      --navy-dark: #071440;
      --cyan: #00C8E6;
      --white: #ffffff;
    }

    body {
      margin: 0;
      font-family: Poppins, sans-serif;
      background: radial-gradient(circle at top, #0A1F52, #071440);
      color: white;
      overflow: hidden;
    }

    /* ORBIT CONTAINER */
 <div id="employee-container" class="employee-grid"></div>

    /* CARD */
    .card {
  position: absolute;
  width: 140px;
  height: 180px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(0,200,230,0.3);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  box-shadow: 0 0 20px rgba(0,200,230,0.2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;

  transition: 0.4s ease;
  animation: floatCard 6s ease-in-out infinite;
}

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(0,200,230,0.5);
    }

    .card img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--cyan);
    }

    .name {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 600;
    }

    .role {
      font-size: 11px;
      opacity: 0.7;
    }

    /* PROFILE VIEW */
    .profile {
      position: fixed;
      inset: 0;
      background: var(--navy-dark);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 20px;
    }

    .profile img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid var(--cyan);
      margin-bottom: 15px;
    }

    .btn {
      margin-top: 10px;
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      background: var(--cyan);
      color: var(--navy-dark);
      font-weight: 600;
      cursor: pointer;
    }
@keyframes floatCard {
  0% { transform: translate(var(--x), var(--y)) translateY(0px); }
  50% { transform: translate(var(--x), var(--y)) translateY(-10px); }
  100% { transform: translate(var(--x), var(--y)) translateY(0px); }
}
  </style>
</head>
