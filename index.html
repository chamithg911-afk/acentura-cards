<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acentura – Digital Card</title>

  <!-- Poppins font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Shared brand variables -->
  <link rel="stylesheet" href="assets/css/style.css" />
  <!-- Profile-specific styles -->
  <link rel="stylesheet" href="assets/css/profile.css" />
</head>
<body>

  <!-- Loading state — shown while we fetch from Supabase -->
  <div id="loading" class="loading-screen">
    <div class="loading-spinner"></div>
    <p>Loading profile…</p>
  </div>

  <!-- Main card — hidden until data loads -->
  <div id="profile" class="profile-wrapper" style="display:none;">

    <!-- Top brand bar -->
    <header class="profile-header">
      <a href="https://acentura.com" target="_blank" rel="noopener">
        <img src="assets/images/acentura-logo.png" alt="Acentura" class="brand-logo" 
             onerror="this.style.display='none'; this.nextElementSibling.style.display='block'"/>
        <span class="brand-wordmark" style="display:none;">ACENTURA</span>
      </a>
    </header>

    <!-- Hero section: photo + name + role -->
    <section class="profile-hero">
      <div class="photo-ring">
        <img id="emp-photo" src="" alt="Profile photo" class="profile-photo" />
        <div class="photo-initials" id="emp-initials" style="display:none;"></div>
      </div>

      <h1 id="emp-name" class="emp-name"></h1>
      <p id="emp-role" class="emp-role"></p>
      <p id="emp-department" class="emp-department"></p>
    </section>

    <!-- Action buttons -->
    <section class="profile-actions">
      <a id="btn-call" href="#" class="action-btn btn-primary" style="display:none;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
        </svg>
        Call
      </a>

      <a id="btn-email" href="#" class="action-btn btn-secondary" style="display:none;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
        </svg>
        Email
      </a>

      <a id="btn-linkedin" href="#" class="action-btn btn-secondary" target="_blank" rel="noopener" style="display:none;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2z"/>
          <circle cx="4" cy="4" r="2"/>
        </svg>
        LinkedIn
      </a>

      <button id="btn-save" class="action-btn btn-cyan">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4zm-5 16a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm3-10H5V5h10v4z"/>
        </svg>
        Save Contact
      </button>
    </section>

    <!-- Footer -->
    <footer class="profile-footer">
      <p>Powered by <a href="https://acentura.com" target="_blank" rel="noopener">Acentura</a></p>
    </footer>

  </div>

  <!-- Deactivated state -->
  <div id="deactivated" class="state-screen" style="display:none;">
    <div class="state-icon">🔒</div>
    <h2>This card is no longer active</h2>
    <p>Please contact <a href="https://acentura.com">Acentura</a> for updated contact details.</p>
  </div>

  <!-- Scripts -->
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/profile.js"></script>
</body>
</html>
